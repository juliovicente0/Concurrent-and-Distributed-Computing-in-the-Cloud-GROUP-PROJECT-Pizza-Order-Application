# Three services: app (Node API) + db (MariaDB) + proxy (nginx).
# - "backend" network is private (no ports exposed): only proxy + app + db talk over it.
# - "frontend" network is the one nginx publishes to the host on :80.
# - The app is NEVER published directly — all traffic goes through nginx.

name: pizza-app

services:

  db:
    image: mariadb:11
    container_name: pizza-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # On first start (empty volume), MariaDB executes any .sql file mounted here.
      - ./transactions.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    # In CI/CD the image will come from GHCR, but for local dev we build from source.
    image: ${APP_IMAGE:-ghcr.io/elmanin/pizza-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pizza-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_KEY: ${JWT_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    # No "ports:" here on purpose — only nginx is exposed to the outside world.

  proxy:
    image: nginx:1.27-alpine
    container_name: pizza-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  db_data:
