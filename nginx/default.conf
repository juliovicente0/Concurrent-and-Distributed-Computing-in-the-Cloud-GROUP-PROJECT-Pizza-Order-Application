upstream pizza_app {
    # "app" is the docker-compose service name; it resolves on the backend network.
    server app:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Basic hardening: hide nginx version
    server_tokens off;

    # Reasonable upload size for an API
    client_max_body_size 10m;

    # Send real client info upstream (important once we put a CDN/firewall in front)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Short timeouts so a stuck upstream doesn't pile up sockets
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Public healthcheck — useful for monitoring / load balancer probes
    location = /healthCheck {
        proxy_pass http://pizza_app;
        access_log off;
    }

    # Everything else goes to the Express app
    location / {
        proxy_pass http://pizza_app;
    }
}
